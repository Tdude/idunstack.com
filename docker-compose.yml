services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env.${SITE_NAME}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5453}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 3s
      timeout: 3s
      retries: 20

  idun-api:
    build:
      context: ./idun-stack/fastapi/services/idun
      dockerfile: Dockerfile
    env_file:
      - .env.${SITE_NAME}
      - ./idun-stack/fastapi/services/idun/.env
    environment:
      # Ensures services reach Postgres by service name
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      HEDEBY_API_URL: ${HEDEBY_API_URL:-http://hedeby-api:8000}
      MIMER_API_URL: ${MIMER_API_URL:-http://mimer-api:8000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - "${IDUN_API_PORT:-8031}:8000"
    volumes:
      - idun_uploads:/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/docs >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  idun-ui:
    build:
      context: ./idun-stack/idun-ui
      dockerfile: Dockerfile
      args:
        - DISABLE_CSRF_CHECK=${DISABLE_CSRF_CHECK:-0}
        - PUBLIC_API_URL=${PUBLIC_API_URL}
        - PUBLIC_SITE_URL=${PUBLIC_SITE_URL}
        - PUBLIC_ANALYTICS_URL=${PUBLIC_ANALYTICS_URL}
        - PUBLIC_ANALYTICS_TEAM_ID=${PUBLIC_ANALYTICS_TEAM_ID}
        - PUBLIC_UMAMI_WEBSITE_ID=${PUBLIC_UMAMI_WEBSITE_ID}
        - SITE_NAME=${SITE_NAME}
        - PUBLIC_ENABLE_ELEARNING=${PUBLIC_ENABLE_ELEARNING:-true}
        - PUBLIC_ENABLE_SHOP=${PUBLIC_ENABLE_SHOP:-true}
        - PUBLIC_ENABLE_SKIIN=${PUBLIC_ENABLE_SKIIN:-true}
    env_file:
      - .env.${SITE_NAME}  # Production settings
      - ./idun-stack/idun-ui/.env
      - ./idun-stack/idun-ui/.env.prod
      - ./idun-stack/idun-ui/.env.local  # Empty on production, contains overrides locally
    environment:
      NODE_ENV: production
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      PUBLIC_ANALYTICS_URL: ${PUBLIC_ANALYTICS_URL}
      PUBLIC_ANALYTICS_TEAM_ID: ${PUBLIC_ANALYTICS_TEAM_ID}
      PUBLIC_UMAMI_WEBSITE_ID: ${PUBLIC_UMAMI_WEBSITE_ID}
      PUBLIC_ENABLE_ELEARNING: ${PUBLIC_ENABLE_ELEARNING:-true}
      PUBLIC_ENABLE_SHOP: ${PUBLIC_ENABLE_SHOP:-true}
      PUBLIC_ENABLE_SKIIN: ${PUBLIC_ENABLE_SKIIN:-true}
      MIMER_API_URL: ${MIMER_API_URL:-http://mimer-api:8000}
      HEDEBY_API_URL: ${HEDEBY_API_URL:-http://hedeby-api:8000}
      SKIIN_API_URL: ${SKIIN_API_URL:-http://skiin-api:8000}
      HUGIN_API_URL: ${HUGIN_API_URL:-http://hugin-api:8000}
      API_URL: ${API_URL:-http://idun-api:8000/api/v1}
      SKJOLD_BASE_URL: ${SKJOLD_BASE_URL:-http://skjold-api:8000}
    ports:
      - "${UI_PORT:-5175}:3000"
    volumes:
      - idun_ui_data:/app/data
    depends_on:
      idun-api:
        condition: service_healthy
      skjold-api:
        condition: service_healthy

  bifrost-api:
    build:
      context: ./idun-stack/fastapi/services/bifrost
      dockerfile: Dockerfile
    env_file:
      - .env.${SITE_NAME}
      - ./idun-stack/fastapi/services/bifrost/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "${BIFROST_API_PORT:-8032}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/docs >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  skjold-api:
    build:
      context: ./idun-stack/fastapi/services/skjold
      dockerfile: Dockerfile
    env_file:
      - .env.${SITE_NAME}
      - ./idun-stack/fastapi/services/skjold/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SKJOLD_ADMIN_EMAIL: ${SKJOLD_ADMIN_EMAIL}
      SKJOLD_ADMIN_PASSWORD: ${SKJOLD_ADMIN_PASSWORD}
      SKJOLD_ADMIN_RESET: ${SKJOLD_ADMIN_RESET}
    ports:
      - "${SKJOLD_API_PORT:-8033}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/docs >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  mimer-api:
    build:
      context: ./idun-stack/fastapi/services/mimer
      dockerfile: Dockerfile
    env_file:
      - .env.${SITE_NAME}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ENABLE_ELEARNING: ${ENABLE_ELEARNING:-true}
      ELEARNING_MEDIA_STORAGE: ${ELEARNING_MEDIA_STORAGE:-local}
      ELEARNING_MAX_VIDEO_SIZE_MB: ${ELEARNING_MAX_VIDEO_SIZE_MB:-500}
      ELEARNING_CERTIFICATE_ENABLED: ${ELEARNING_CERTIFICATE_ENABLED:-true}
    ports:
      - "${MIMER_API_PORT:-8034}:8000"
    volumes:
      - mimer_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/docs >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  hedeby-api:
    build:
      context: ./idun-stack/fastapi/services/shop
      dockerfile: Dockerfile
    env_file:
      - .env.${SITE_NAME}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SKJOLD_BASE_URL: ${SKJOLD_BASE_URL:-http://skjold-api:8000}
    ports:
      - "${HEDEBY_API_PORT:-8035}:8000"
    depends_on:
      db:
        condition: service_healthy
      skjold-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/docs >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  hugin-api:
    build:
      context: ./idun-stack/fastapi/services/assistant
      dockerfile: Dockerfile
    env_file:
      - .env.${SITE_NAME}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      SKJOLD_URL: ${SKJOLD_BASE_URL:-http://skjold-api:8000}
    ports:
      - "${HUGIN_API_PORT:-8036}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://127.0.0.1:8000/health\").raise_for_status()' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  skiin-api:
    build:
      context: ./idun-stack/fastapi/services/skiin
      dockerfile: Dockerfile
    env_file:
      - .env.${SITE_NAME}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SKJOLD_BASE_URL: ${SKJOLD_BASE_URL:-http://skjold-api:8000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "${SKIIN_API_PORT:-8037}:8000"
    depends_on:
      db:
        condition: service_healthy
      skjold-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/docs >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  pgdata:
  idun_uploads:
  idun_ui_data:
  mimer_media:
